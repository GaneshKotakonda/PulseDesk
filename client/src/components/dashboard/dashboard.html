<div class="flex">

<div class="w-64 h-screen bg-[#082C4A] text-white flex flex-col">


    <div class="flex items-center gap-3">
        <img src="/logo.png" class="w-40 h-26" alt="logo">
        <span class="text-2xl font-bold text-blue-500 "></span>
    </div>


   
    <nav class="flex flex-col mt-2">

        <a (click)="selected='dashboard'" class="flex items-center border-white rounded gap-3 px-5 py-3 mx-4 hover:bg-blue-700">
          <i class="fa-solid fa-house"></i> Dashboard
        </a>

        <a (click)="selected='patients'" class="flex items-center gap-3 px-5 py-3 border-white rounded hover:bg-blue-700 mx-4 active:bg-blue-700  ">

           <i class="fa-solid fa-user-injured"></i>
 patients
        </a>

        <a (click)="selected='doctors'" class="flex items-center gap-3 px-5 py-3 mx-4 border-white rounded hover:bg-blue-700">

          <i class="fa-solid fa-user-doctor"></i>
  doctors
        </a>

        <a (click)="selected='Appointments'" class="flex items-center border-white rounded gap-3 px-5 py-3 mx-4 hover:bg-blue-700">
          <i class="fa-solid fa-calendar-days"></i>
  Appointments
        </a>

        <a (click)="selected='Billing'" class="flex items-center gap-3 px-5 py-3 border-white rounded hover:bg-blue-700 mx-4 active:bg-blue-700  ">

          <i class="fa-solid fa-file-invoice-dollar"></i>
  Billing
        </a>

        <a (click)="selected='pharmacy'"  class="flex items-center gap-3 px-5 py-3 mx-4 border-white rounded hover:bg-blue-700">

          <i class="fa-solid fa-pills"></i>
  pharmacy
        </a>

        <a (click)="selected='Reports'" class="flex items-center border-white rounded gap-3 px-5 py-3 mx-4 hover:bg-blue-700">
          <i class="fa-solid fa-chart-line"></i>
  Reports
        </a>

        <a (click)="selected='Users'" class="flex items-center gap-3 px-5 py-3 border-white rounded hover:bg-blue-700 mx-4 active:bg-blue-700  ">

          <i class="fa-solid fa-users"></i>
  Users
        </a>

        <a (click)="selected='settings'" class="flex items-center gap-3 px-5 py-3 mx-4 border-white rounded hover:bg-blue-700">

           <i class="fa-solid fa-gear"></i>
 settings
        </a>
        <a (click)="logout()" class="flex items-center gap-3 px-5 py-3 mx-4 border-white rounded hover:bg-blue-700">

           <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>

    </nav>


 

</div>
<div class="bg-blue-50 w-full h-screen">
<div *ngIf="selected === 'dashboard'" class="mx-[3%] mt-[2%]">
        <p class="font-semibold text-black text-3xl">Welcome Back!</p>
        <p class="text-gray-600 mt-2">here's whats happening in your hospital</p>
        <div class="bg-white ">
            <p class="text-blue-400">Total Patients</p>
            <p>{{num}}</p>
        </div>


</div>
</div>
</div>
