<div class="mx-[3%] mt-[2%]">

    <!-- Header -->
    <div class="flex justify-between items-center">

        <div>
            <h1 class="text-3xl font-semibold">Doctors</h1>
            <p class="text-gray-500 mt-2">
                Search, add, edit, and manage doctor records.
            </p>
        </div>

        <button
            class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-lg">
            <i class="fa-solid fa-plus mr-2"></i>
            Add Doctor
        </button>

    </div>

    <!-- Search -->
    <div class="relative w-96 mt-8">

        <input
            type="text"
            placeholder="Search doctors..."
            class="w-full border border-gray-300 rounded-lg py-3 pl-10 pr-4 outline-none focus:ring-2 focus:ring-blue-500">

        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

    </div>

    <!-- Doctors List -->
    <div class="bg-white rounded-xl shadow mt-8 overflow-hidden">

        <!-- Heading Row -->
        <div class="grid grid-cols-6 px-6 py-4 font-semibold border-b border-gray-300 text-gray-600 bg-white">

            <div>ID</div>
            <div>Name</div>
            <div>Specialization</div>
            <div>Phone</div>
            <div>Email</div>
            <div class="text-center">Actions</div>

        </div>

        <!-- Data Rows -->
        <div
            *ngFor="let doctor of doctors()"
            class="grid grid-cols-6 px-6 py-5 border-b border-gray-200 items-center hover:bg-gray-50">

            <div>
                D{{ doctor.id }}
            </div>

            <div>
                {{ doctor.name }}
            </div>

            <div>
                {{ doctor.specialization }}
            </div>

            <div>
                {{ doctor.phone }}
            </div>

            <div>
                {{ doctor.email }}
            </div>

            <div class="flex justify-center gap-5">

                <button class="text-blue-500 hover:text-blue-700">
                    <i class="fa-solid fa-eye"></i>
                </button>

                <button class="text-blue-600 hover:text-blue-800">
                    <i class="fa-solid fa-pen"></i>
                </button>

                <button class="text-red-500 hover:text-red-700">
                    <i class="fa-solid fa-trash"></i>
                </button>

            </div>

        </div>

    </div>

    <!-- Footer / Pagination -->
    <div class="flex justify-between items-center mt-4 text-gray-500 text-sm">

       

      

    </div>

</div>
